experiment_name: example_additional_scans
processing_mode: local
config_reviewed: true
config_note: Example template for Additional_Scans marker-based plant splitting with side split and PCL post-processing.

analysis:
  split_source: marks
  marks:
    target_type: plant
    buffer_u: 0.0
    missing_file: error
    write_pointcloud: true

  # Backward-compatible aliases (optional in old configs)
  use_markers: true
  mark_target_type: plant
  marker_target_type: plant
  mark_z_buffer_u: 0.0
  marker_z_buffer_u: 0.0
  markers_required: true
  write_marker_pointcloud: true

  additional_scan_side_split: true
  additional_scan_side_axis: x
  additional_scan_positive_side_label: right
  additional_scan_negative_side_label: left

  pointcloud_ops:
    - name: bilateral_scalar_filter
      scalar: rssi_norm
      output_scalar: rssi_norm_bilateral
      replace_scalar: false
      spatial_sigma_m: 0.02
      scalar_sigma: 4.0

    - name: scalar_range_filter
      scalar: rssi_norm_bilateral
      min: 1.0
      max: null

    - name: topology_trait
      enabled: true
      split_sides_for_single_plot: true
      two_row_mode: target_only

    - name: height_range_filter
      axis: Y
      min_m: 0.03
      max_m: null

    - name: voxel_count
      voxel_size_m: 0.05

  pcl_backend:
    enabled: false
