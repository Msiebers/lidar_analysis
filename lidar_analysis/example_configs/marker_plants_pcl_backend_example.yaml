analysis:
  split_source: marks
  use_markers: true
  marker_target_type: plant
  marker_z_buffer_u: 2.0
  markers_required: true
  write_marker_pointcloud: true

  normalize_rssi: true
  rssi_norm_mode: zscore
  rssi_norm_scope: scan_after_global_masks
  use_rssi_filter: false
  rssi_min: null
  rssi_max: null

  generate_pointclouds: true

  pcl_backend:
    enabled: false
    executable: null
    work_dir: null
    keep_intermediate: true
    fail_if_missing: true

  # Phase 1 backend proves batch/no-op processing only.
  pointcloud_ops:
    - name: bilateral_scalar
      backend: pcl
      enabled: false
      scalar: rssi_norm
      output_scalar: rssi_bilateral
      spatial_sigma_u: 0.02
      scalar_sigma: 0.20
      radius_u: 0.04
      max_neighbors: 64
    - name: scalar_range_filter
      backend: pcl
      enabled: false
      scalar: rssi_bilateral
      min_value: 4.0
      max_value: null
    - name: sor
      backend: pcl
      enabled: false
      mean_k: 16
      stddev_mul_thresh: 2.0
    - name: voxelize
      backend: pcl
      enabled: false
      voxel_size_u: 0.05
      aggregation:
        x: mean
        y: mean
        z: mean
        RSSI: mean
        rssi_norm: mean
        rssi_bilateral: mean
        point_count: count
